name: xml_object_mapping_workspace
description: A Dart library for mapping XML data to Dart objects using annotations.
version: 1.0.0
repository: https://github.com/infumia/xml_object_mapping
publish_to: none

workspace:
  - packages/xml_object_mapping
  - packages/xml_object_mapping_generator
  - example/

environment:
  sdk: ^3.11.1

dev_dependencies:
  flint: ^2.14.0
  melos: ^7.5.1

melos:
  scripts:
    fix:
      run: dart fix --apply && dart format .
      exec:
        concurrency: 2
